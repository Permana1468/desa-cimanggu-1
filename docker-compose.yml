services:
  db:
    image: postgis/postgis:15-3.3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=desa_cimanggu_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  web:
    build: .
    volumes:
      - ./media:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-prod-key-change-me
      - ALLOWED_HOSTS=*
      - DB_NAME=desa_cimanggu_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
